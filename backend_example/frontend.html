<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Frontend Example</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    button { padding: 0.5rem 1rem; }
    #message { margin-top: 1rem; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Frontend to Backend Demo</h1>
  <p>Type a word and send it to the backend.</p>
  <label for="word-input">Word</label>
  <input id="word-input" type="text" placeholder="hello" />
  <button id="send-word">Send to backend</button>
  <div id="message"></div>

  <script>
    document.getElementById("send-word").addEventListener("click", async () => {
      const messageBox = document.getElementById("message");
      const word = document.getElementById("word-input").value.trim();

      if (!word) {
        messageBox.textContent = "Please enter a word first.";
        return;
      }

      messageBox.textContent = "Sending...";

      try {
        const response = await fetch("http://127.0.0.1:5000/api/word", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ word }),
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        messageBox.textContent = data.reply;
      } catch (error) {
        messageBox.textContent = `Request failed: ${error.message}`;
      }
    });
  </script>
</body>
</html>
